<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TalkSense - Speech Analyzer</title>
    
    <!-- Load Tailwind CSS via CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'selector',
        theme: {
          extend: {
            colors: {
              primary: 'var(--primary)',
              bgApp: 'var(--bg-app)',
              textMain: 'var(--text-main)',
              accent: 'var(--accent)',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>
    
    <!-- External Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/prop-types/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/classnames/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.0/babel.min.js" crossorigin></script>

    <!-- Load Framer Motion via UMD -->
    <script src="https://cdn.jsdelivr.net/npm/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Load PDF Export Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Load MediaPipe for Real AI Face/Gaze Tracking -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    

    
    <!-- Load Recharts via UMD - UNPKG is more reliable for UMD builds -->
    <script src="https://unpkg.com/recharts/dist/Recharts.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/styles/index.css" />
  </head>
  <body class="bg-bgApp text-textMain min-h-screen transition-colors duration-300">
    <div id="root">
      <div style="background:var(--bg-app, #f8fafc); color:var(--primary, #064e3b); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:sans-serif;">
        <div style="width: 50px; height: 50px; border: 3px solid rgba(6,78,59,0.1); border-top-color: var(--primary, #064e3b); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
        <h1 style="color:var(--primary, #064e3b); font-size: 1.2rem; letter-spacing: 4px; font-weight: 900;">TALKSENSE</h1>
      </div>
    </div>

    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    
    <script>
      // Global Component Registry
      window.TalkSense = {
        register: function(name, component) {
          console.log("Registering component:", name);
          window[name] = component;
        }
      };
      
      // Setup global environment for Babel components
      const setupGlobals = () => {
        console.log("Global setup initializing...");
        if (typeof React !== 'undefined') {
          const { useState, useEffect, useMemo, useCallback, useRef } = React;
          window.useState = useState;
          window.useEffect = useEffect;
          window.useMemo = useMemo;
          window.useCallback = useCallback;
          window.useRef = useRef;
        }
        
        if (window.Motion) {
          window.motion = window.Motion.motion;
          window.AnimatePresence = window.Motion.AnimatePresence;
        }

        // Try standard Recharts name or the umd-wrapped Recharts name
        const R = window.Recharts;
        if (R) {
          console.log("Recharts detected successfully.");
          const components = [
            'LineChart', 'Line', 'AreaChart', 'Area', 'XAxis', 'YAxis', 'CartesianGrid', 
            'Tooltip', 'ResponsiveContainer', 'BarChart', 'Bar', 'Cell', 'PieChart', 'Pie'
          ];
          components.forEach(comp => {
            window[comp] = R[comp];
          });
        } else {
          console.warn("Recharts not found on window. Retrying in 250ms...");
          setTimeout(setupGlobals, 250);
        }
      };

      setupGlobals();
    </script>
    
    <!-- Custom Cursor Element -->
    <div id="custom-cursor" class="fixed top-0 left-0 w-4 h-4 rounded-full bg-primary pointer-events-none mix-blend-screen z-50 transition-transform duration-75"></div>
    
    <script>
      // Simple custom cursor logic to run alongside React
      const cursor = document.getElementById('custom-cursor');
      document.addEventListener('mousemove', (e) => {
        cursor.style.transform = `translate(${e.clientX - 8}px, ${e.clientY - 8}px)`;
      });
    </script>
    
    <script>
      window.TALKSENSE_BUILD = "2026-04-07-sentiment-v1";
      window.TALKSENSE_API_BASE = "http://127.0.0.1:8000";
    </script>

    <script type="text/babel" data-presets="react,env" src="components/Navbar.jsx?v=2026-04-07-sentiment-v1"></script>
    <!-- Load Page Components -->
    <script type="text/babel" data-presets="react,env" src="pages/AnalyticsWorkspace.jsx?v=2026-04-07-sentiment-v1"></script>
    <script type="text/babel" data-presets="react,env" src="pages/LandingPage.jsx?v=2026-04-07-sentiment-v1"></script>
    <script type="text/babel" data-presets="react,env" src="pages/AuthPages.jsx?v=2026-04-07-sentiment-v1"></script>
    <script type="text/babel" data-presets="react,env" src="pages/SetupPage.jsx?v=2026-04-07-sentiment-v1"></script>
    <script type="text/babel" data-presets="react,env" src="pages/LiveSpeechPage.jsx?v=2026-04-07-sentiment-v1"></script>
    <script type="text/babel" data-presets="react,env" src="pages/ReportPage.jsx?v=2026-04-07-sentiment-v1"></script>
    <script type="text/babel" data-presets="react,env" src="pages/AICoachPage.jsx?v=2026-04-07-sentiment-v1"></script>
    <script type="text/babel" data-presets="react,env" src="pages/VocabPage.jsx?v=2026-04-07-sentiment-v1"></script>
    <script type="text/babel" data-presets="react,env" src="pages/SpeechLabPage.jsx?v=2026-04-07-sentiment-v1"></script>
    <script type="text/babel" data-presets="react,env" src="pages/DashboardPage.jsx?v=2026-04-07-sentiment-v1"></script>
    <script type="text/babel" data-presets="react,env" src="pages/SettingsPage.jsx?v=2026-04-07-sentiment-v1"></script>
    <script type="text/babel" data-presets="react,env" src="pages/HelpPage.jsx?v=2026-04-07-sentiment-v1"></script>
    <!-- Main App Entry in Babel -->
    <script type="text/babel" data-presets="react,env" src="app.jsx?v=2026-04-07-sentiment-v1"></script>

    <script type="text/babel">
      // This runs after Babel has compiled and executed the other scripts
      setTimeout(() => {
        console.log("FINAL SYSTEM CHECK:");
        console.log("Navbar:", !!window.Navbar);
        console.log("Dashboard:", !!window.Dashboard);
        console.log("AnalyticsPage:", !!window.AnalyticsPage);
        console.log("App:", !!window.App);
        
        if (window.App) {
          const root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(<App />);
        }
      }, 3500); // Increased delay for all Babel scripts to compile
    </script>

    <script>
      // Diagnostic log after everything should be loaded
    </script>
  </body>
</html>
